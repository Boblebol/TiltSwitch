name: Package App

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to attach artifacts to
        required: true
        default: v0.1.5
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build package
        run: bash scripts/package-release.sh "${{ steps.version.outputs.version }}"

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${{ steps.version.outputs.tag }}" >/dev/null 2>&1 || \
            gh release create "${{ steps.version.outputs.tag }}" \
              --title "TiltSwitch ${{ steps.version.outputs.version }}" \
              --notes "Packaged TiltSwitch ${{ steps.version.outputs.version }} for macOS."

          gh release upload "${{ steps.version.outputs.tag }}" \
            "dist/TiltSwitch-${{ steps.version.outputs.tag }}-macOS.zip" \
            "dist/TiltSwitch-${{ steps.version.outputs.tag }}-macOS.dmg" \
            "dist/checksums.txt" \
            --clobber
